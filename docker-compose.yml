version: '3.8'

services:
  # 后端服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hot-monitor-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:/app/data/dev.db
      - CLIENT_URL=http://localhost:5173
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TWITTER_API_KEY=${TWITTER_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-}
    volumes:
      - ./server/data:/app/data
    networks:
      - hot-monitor-network
    restart: unless-stopped

  # 前端服务
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hot-monitor-client
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - hot-monitor-network
    restart: unless-stopped

networks:
  hot-monitor-network:
    driver: bridge
